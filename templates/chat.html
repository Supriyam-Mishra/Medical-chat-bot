<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Medical AI Assistant</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css')}}"/>

</head>
<body>

<div class="chat-container">

<div class="chat-header">

<img src="https://cdn-icons-png.flaticon.com/512/387/387569.png">
<h3>Medical AI Assistant</h3>

<button id="themeToggle" class="theme-btn">
<i class="fa fa-moon"></i>
</button>

</div>

<div class="chat-body" id="chatBody"></div>

<div class="chat-footer">
<input type="text" id="text" placeholder="Ask about symptoms...">

<button class="send-btn" id="sendBtn">
<i class="fa fa-paper-plane"></i>
</button>

</div>

</div>

<script>

const chatBody = document.getElementById("chatBody");
const input = document.getElementById("text");
const sendBtn = document.getElementById("sendBtn");
const themeToggle = document.getElementById("themeToggle");

const userIcon="https://cdn-icons-png.flaticon.com/512/9131/9131529.png";
const botIcon="https://cdn-icons-png.flaticon.com/512/387/387569.png";

function scrollChat(){
chatBody.scrollTop = chatBody.scrollHeight;
}

function sendMessage(){

let text = input.value.trim();
if(text==="") return;

let userHTML = `
<div class="chat-message user">
<img src="${userIcon}">
<div class="message">${text}</div>
</div>`;

chatBody.insertAdjacentHTML("beforeend",userHTML);

input.value="";
scrollChat();


let loader = `
<div id="typing" class="chat-message bot">
<img src="${botIcon}">
<div class="message">
<div class="typing">
<span></span><span></span><span></span>
</div>
</div>
</div>`;

chatBody.insertAdjacentHTML("beforeend",loader);

scrollChat();


fetch("/get",{
method:"POST",
headers:{
"Content-Type":"application/x-www-form-urlencoded"
},
body:`msg=${encodeURIComponent(text)}`
})

.then(response=>response.text())

.then(data=>{

document.getElementById("typing").remove();

let botHTML = `
<div class="chat-message bot">
<img src="${botIcon}">
<div class="message">${data}</div>
</div>`;

chatBody.insertAdjacentHTML("beforeend",botHTML);

scrollChat();

});

}

sendBtn.addEventListener("click",sendMessage);

input.addEventListener("keypress",function(e){
if(e.key==="Enter"){
sendMessage();
}
});


/* DARK MODE SYSTEM */

if(localStorage.getItem("theme") === "dark"){
document.body.classList.add("dark-mode");
themeToggle.innerHTML = '<i class="fa fa-sun"></i>';
}

themeToggle.addEventListener("click",()=>{

document.body.classList.toggle("dark-mode");

if(document.body.classList.contains("dark-mode")){

localStorage.setItem("theme","dark");
themeToggle.innerHTML = '<i class="fa fa-sun"></i>';

}else{

localStorage.setItem("theme","light");
themeToggle.innerHTML = '<i class="fa fa-moon"></i>';

}

});

</script>

</body>
</html>
